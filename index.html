<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>6月热销 · 男女袜寻品清单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            background: #f5f7fb;
            color: #1a1a2e;
            padding: 20px;
        }
        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        /* ===== 顶部横幅 ===== */
        .banner {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 20px;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .banner::after {
            content: "🧦";
            position: absolute;
            right: 28px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 64px;
            opacity: 0.12;
        }
        .banner h1 {
            font-size: 24px;
            font-weight: 700;
        }
        .banner .sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
        }
        .banner .sub .highlight {
            background: rgba(255, 215, 0, 0.18);
            padding: 2px 12px;
            border-radius: 16px;
            color: #ffd700;
            font-size: 12px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        .banner .sub .tip {
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 12px;
            border-radius: 16px;
            font-size: 12px;
        }

        /* ===== 统计栏 ===== */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 28px;
            background: #fff;
            padding: 12px 22px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            margin-bottom: 18px;
            align-items: center;
        }
        .stats-bar .stat-item {
            font-size: 14px;
            color: #555;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }
        .stats-bar .stat-item .num {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .stats-bar .stat-item .num.accent {
            color: #e74c3c;
        }
        .stats-bar .divider {
            width: 1px;
            height: 24px;
            background: #e0e4ea;
        }

        /* ===== 筛选栏 ===== */
        .filter-bar {
            background: #fff;
            padding: 14px 18px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            margin-bottom: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            align-items: center;
        }
        .filter-bar .filter-group {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #888;
        }
        .filter-bar .filter-group label {
            font-weight: 500;
            white-space: nowrap;
        }
        .filter-bar select,
        .filter-bar input {
            padding: 5px 10px;
            border: 1px solid #dce0e6;
            border-radius: 6px;
            font-size: 12px;
            background: #fafbfc;
            outline: none;
            transition: 0.2s;
        }
        .filter-bar select:focus,
        .filter-bar input:focus {
            border-color: #4a6cf7;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.08);
        }
        .filter-bar .search-box {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
            flex: 1;
            min-width: 140px;
            max-width: 260px;
        }
        .filter-bar .search-box input {
            flex: 1;
            min-width: 80px;
        }
        .filter-bar .price-range input {
            width: 70px;
        }
        .filter-bar .price-range span {
            color: #bbb;
            font-size: 12px;
        }

        /* ===== 工具栏 ===== */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }
        .toolbar .left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: #666;
        }
        .toolbar .left select {
            padding: 4px 10px;
            border: 1px solid #dce0e6;
            border-radius: 6px;
            font-size: 12px;
            background: #fff;
        }
        .toolbar .view-toggle {
            display: flex;
            gap: 3px;
            background: #f0f2f5;
            border-radius: 8px;
            padding: 3px;
        }
        .toolbar .view-toggle button {
            padding: 4px 14px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            background: transparent;
            color: #888;
            transition: 0.2s;
        }
        .toolbar .view-toggle button.active {
            background: #fff;
            color: #1a1a2e;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }
        .toolbar .view-toggle button:hover:not(.active) {
            color: #333;
        }

        /* ===== 商品网格 ===== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .product-grid.list-view {
            grid-template-columns: 1fr;
        }

        /* ===== 商品卡片 ===== */
        .product-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(0, 0, 0, 0.08);
        }
        .product-card .card-top {
            display: flex;
            gap: 14px;
            padding: 14px 16px 10px;
        }
        .product-card .card-img-wrap {
            flex-shrink: 0;
            width: 90px;
            height: 90px;
            border-radius: 10px;
            overflow: hidden;
            background: #f0f2f5;
            position: relative;
        }
        .product-card .card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-card .card-img-wrap .more-imgs {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 8px;
        }
        .product-card .card-info {
            flex: 1;
            min-width: 0;
        }
        .product-card .card-title {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #1a1a2e;
        }
        .product-card .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 8px;
            margin-top: 4px;
            font-size: 11px;
            color: #999;
        }
        .product-card .card-meta .itemid {
            color: #bbb;
        }
        .product-card .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }
        .product-card .card-tags .tag {
            font-size: 10px;
            padding: 1px 8px;
            border-radius: 10px;
            background: #f0f4ff;
            color: #4a6cf7;
        }
        .product-card .card-tags .tag.l2 {
            background: #f5f0ff;
            color: #8b5cf6;
        }
        .product-card .card-tags .tag.l3 {
            background: #f0faf5;
            color: #27ae60;
        }

        /* ===== 价格定位标签 ===== */
        .price-judge {
            display: inline-block;
            padding: 1px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }
        .price-judge.高价品 {
            background: #fff3e0;
            color: #e67e22;
        }
        .price-judge.中价品 {
            background: #e8f5e9;
            color: #388e3c;
        }
        .price-judge.低价品 {
            background: #e3f2fd;
            color: #1976d2;
        }
        .price-judge.unknown {
            background: #f0f0f0;
            color: #999;
        }

        /* ===== 款式列表 ===== */
        .variant-list {
            padding: 0 16px 12px;
        }
        .variant-list .variant-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            border-radius: 8px;
            background: #f8f9fc;
            margin-bottom: 4px;
            transition: background 0.15s;
            cursor: default;
            flex-wrap: wrap;
            gap: 4px 8px;
        }
        .variant-list .variant-item:hover {
            background: #f0f4ff;
        }
        .variant-list .variant-item .v-name {
            font-size: 13px;
            color: #333;
            flex: 1;
            min-width: 80px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .variant-list .variant-item .v-price {
            font-weight: 600;
            color: #e74c3c;
            font-size: 14px;
            white-space: nowrap;
        }
        .variant-list .variant-item .v-model {
            font-size: 10px;
            color: #bbb;
            font-family: monospace;
            white-space: nowrap;
        }
        .variant-list .variant-item .v-img {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            object-fit: cover;
            background: #eee;
            flex-shrink: 0;
            cursor: pointer;
        }
        .variant-list .variant-item .v-img:hover {
            transform: scale(2);
            z-index: 5;
            position: relative;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        /* ===== 卡片底部 ===== */
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px 14px;
            flex-wrap: wrap;
            gap: 6px 10px;
            border-top: 1px solid #f0f2f5;
        }
        .card-footer .left {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #999;
            flex-wrap: wrap;
        }
        .card-footer .left .update-date {
            color: #bbb;
        }
        .card-footer .left .model-count {
            background: #f0f2f5;
            padding: 0 8px;
            border-radius: 10px;
            font-size: 10px;
            color: #666;
        }
        .invite-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border: 1px dashed #4a6cf7;
            border-radius: 16px;
            font-size: 11px;
            color: #4a6cf7;
            background: rgba(74, 108, 247, 0.06);
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
            font-weight: 500;
            white-space: nowrap;
        }
        .invite-btn:hover {
            background: #4a6cf7;
            color: #fff;
            border-style: solid;
        }
        .invite-btn.copied {
            border-color: #27ae60;
            color: #27ae60;
            background: rgba(39, 174, 96, 0.1);
        }
        .invite-btn .badge {
            font-size: 9px;
            background: rgba(74, 108, 247, 0.15);
            padding: 0 6px;
            border-radius: 4px;
            font-family: -apple-system, sans-serif;
        }
        .invite-btn:hover .badge {
            background: rgba(255, 255, 255, 0.2);
        }
        .link-1688 {
            font-size: 11px;
            color: #4a6cf7;
            text-decoration: none;
            padding: 2px 8px;
            border-radius: 4px;
            background: #f0f4ff;
        }
        .link-1688:hover {
            background: #4a6cf7;
            color: #fff;
        }

        /* ===== 分页 ===== */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 12px 0 6px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 5px 14px;
            border: 1px solid #dce0e6;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }
        .pagination button:hover:not(:disabled) {
            background: #f0f4ff;
            border-color: #4a6cf7;
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination .page-info {
            font-size: 13px;
            color: #666;
        }
        .pagination .page-size-select {
            padding: 4px 8px;
            border: 1px solid #dce0e6;
            border-radius: 6px;
            font-size: 12px;
            background: #fff;
            margin-left: 6px;
        }

        /* ===== 加载 & 空状态 ===== */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .loading .spinner {
            display: inline-block;
            width: 36px;
            height: 36px;
            border: 4px solid #eee;
            border-top-color: #4a6cf7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }
        .error-msg {
            text-align: center;
            padding: 60px 20px;
            color: #e74c3c;
        }
        .error-msg .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a1a2e;
            color: #fff;
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 13px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.25);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 999;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            .banner {
                padding: 18px 16px;
            }
            .banner h1 {
                font-size: 18px;
            }
            .banner::after {
                font-size: 40px;
                right: 12px;
            }
            .banner .sub {
                font-size: 12px;
                flex-direction: column;
                gap: 6px;
            }
            .stats-bar {
                padding: 10px 14px;
                gap: 8px 16px;
                font-size: 13px;
            }
            .stats-bar .stat-item .num {
                font-size: 17px;
            }
            .filter-bar {
                padding: 10px 12px;
                flex-direction: column;
                align-items: stretch;
            }
            .filter-bar .filter-group {
                flex-wrap: wrap;
            }
            .filter-bar .search-box {
                margin-left: 0;
                max-width: 100%;
            }
            .filter-bar .price-range input {
                width: 60px;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }
            .product-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .product-card .card-top {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .product-card .card-img-wrap {
                width: 120px;
                height: 120px;
            }
            .product-card .card-title {
                font-size: 13px;
                -webkit-line-clamp: 3;
            }
            .variant-list .variant-item {
                font-size: 12px;
                padding: 5px 8px;
            }
            .card-footer {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }
            .card-footer .left {
                justify-content: center;
            }
            .invite-btn {
                justify-content: center;
            }
            .pagination {
                gap: 6px;
            }
            .pagination button {
                padding: 4px 10px;
                font-size: 11px;
            }
        }
        @media (min-width: 769px) and (max-width: 1024px) {
            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ===== 顶部横幅 ===== -->
        <div class="banner">
            <h1>🧦 6月热销 · 男女袜寻品清单</h1>
            <div class="sub">
                <span>📋 单击 <span class="highlight">红色虚线框</span> 复制邀请 ID，一次报满该商品下所有规格</span>
                <span class="tip">📌 提报路径：SCS 卖家后台 → 商品管理 → 机会商品 → 输入邀请 ID → 立刻报名</span>
                <span class="tip">💰 点击 1688 标签查看核价参考，联系买手申诉</span>
            </div>
        </div>

        <!-- ===== 统计栏 ===== -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">📦 共 <span class="num accent" id="totalCount">-</span> 个商品</div>
            <div class="divider"></div>
            <div class="stat-item">💰 均价 <span class="num" id="avgPrice">-</span></div>
            <div class="divider"></div>
            <div class="stat-item">
                📊 <span class="num" id="highCount" style="color:#e67e22;">-</span> 高价品
                <span style="color:#ccc;margin:0 4px;">|</span>
                <span class="num" id="midCount" style="color:#388e3c;">-</span> 中价品
                <span style="color:#ccc;margin:0 4px;">|</span>
                <span class="num" id="lowCount" style="color:#1976d2;">-</span> 低价品
            </div>
            <div class="divider"></div>
            <div class="stat-item">📐 <span class="num" id="variantTotal">-</span> 个款式</div>
        </div>

        <!-- ===== 筛选栏 ===== -->
        <div class="filter-bar" id="filterBar">
            <div class="filter-group search-box">
                <label>🔍</label>
                <input type="text" id="searchInput" placeholder="搜索标题 / ID..." />
            </div>
            <div class="filter-group">
                <label>一级</label>
                <select id="filterL1"><option value="all">全部</option></select>
            </div>
            <div class="filter-group">
                <label>二级</label>
                <select id="filterL2"><option value="all">全部</option></select>
            </div>
            <div class="filter-group">
                <label>三级</label>
                <select id="filterL3"><option value="all">全部</option></select>
            </div>
            <div class="filter-group">
                <label>定位</label>
                <select id="filterPriceJudge">
                    <option value="all">全部</option>
                    <option value="高价品">高价品</option>
                    <option value="中价品">中价品</option>
                    <option value="低价品">低价品</option>
                </select>
            </div>
            <div class="filter-group price-range">
                <label>¥</label>
                <input type="number" id="priceMin" placeholder="最低" min="0" step="0.01" />
                <span>~</span>
                <input type="number" id="priceMax" placeholder="最高" min="0" step="0.01" />
            </div>
            <div class="filter-group">
                <label>日期</label>
                <select id="filterDate">
                    <option value="all">全部</option>
                    <option value="6-23发布">6月23日</option>
                    <option value="6-22发布">6月22日</option>
                    <option value="6-21发布">6月21日</option>
                </select>
            </div>
        </div>

        <!-- ===== 工具栏 ===== -->
        <div class="toolbar">
            <div class="left">
                <span id="resultCount">共 0 个商品</span>
                <select id="sortSelect">
                    <option value="default">默认排序</option>
                    <option value="price-asc">价格 ↑</option>
                    <option value="price-desc">价格 ↓</option>
                </select>
            </div>
            <div class="view-toggle">
                <button class="active" data-view="grid" id="viewGrid">🟦 网格</button>
                <button data-view="list" id="viewList">📋 列表</button>
            </div>
        </div>

        <!-- ===== 加载 / 错误 ===== -->
        <div id="loadingArea" class="loading">
            <div class="spinner"></div>
            <div>正在加载数据...</div>
        </div>
        <div id="errorArea" class="error-msg" style="display:none;">
            <span class="icon">❌</span>
            <div id="errorText">加载失败，请检查 data-new.csv 是否存在</div>
        </div>

        <!-- ===== 商品列表 ===== -->
        <div class="product-grid" id="productGrid"></div>

        <!-- ===== 分页 ===== -->
        <div class="pagination" id="paginationArea">
            <button id="prevPage">◀ 上一页</button>
            <span class="page-info">第 <strong id="currentPageDisplay">1</strong> / <span id="totalPagesDisplay">1</span> 页</span>
            <button id="nextPage">下一页 ▶</button>
            <select class="page-size-select" id="pageSizeSelect">
                <option value="12">12</option>
                <option value="24">24</option>
                <option value="48" selected>48</option>
                <option value="96">96</option>
            </select>
        </div>

        <!-- ===== Toast ===== -->
        <div class="toast" id="toast"></div>
    </div>

    <script>
        // ============================================================
        //  1. 加载 CSV
        // ============================================================

        let allData = [];
        let groupedData = [];
        let filteredData = [];
        let currentPage = 1;
        let pageSize = 48;
        let currentView = 'grid';

        function parseCSV(text) {
            const lines = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const ch = text[i];
                if (ch === '"') inQuotes = !inQuotes;
                else if (ch === '\n' && !inQuotes) { lines.push(current);
                    current = ''; } else current += ch;
            }
            if (current) lines.push(current);

            const result = [];
            const headerLine = lines[0] || '';
            const headers = headerLine.split(',').map(h => h.trim().replace(/^"|"$/g, ''));

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                if (!line.trim()) continue;
                const values = [];
                let val = '',
                    inQ = false;
                for (let j = 0; j < line.length; j++) {
                    const ch = line[j];
                    if (ch === '"') inQ = !inQ;
                    else if (ch === ',' && !inQ) { values.push(val.trim());
                        val = ''; } else val += ch;
                }
                values.push(val.trim());
                const obj = {};
                headers.forEach((h, idx) => {
                    let v = values[idx] || '';
                    v = v.replace(/^"|"$/g, '');
                    obj[h] = v;
                });
                result.push(obj);
            }
            return result;
        }

        async function loadData() {
            const loading = document.getElementById('loadingArea');
            const error = document.getElementById('errorArea');
            const errorText = document.getElementById('errorText');

            try {
                const response = await fetch('data-new.csv');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const csvText = await response.text();
                allData = parseCSV(csvText);
                if (allData.length === 0) throw new Error('CSV 为空');

                // 按 itemid 分组
                groupByItem();

                loading.style.display = 'none';
                error.style.display = 'none';
                renderFilters();
                applyFilters();

            } catch (e) {
                loading.style.display = 'none';
                error.style.display = 'block';
                errorText.textContent = '加载 data-new.csv 失败：' + e.message + '。请确认文件存在。';
                console.error(e);
            }
        }

        // ============================================================
        //  2. 按 itemid 分组
        // ============================================================

        function groupByItem() {
            const map = new Map();
            allData.forEach(item => {
                const id = item.itemid || 'unknown';
                if (!map.has(id)) {
                    map.set(id, {
                        itemid: id,
                        title: item.title || '',
                        l1: item.l1 || '',
                        l2: item.l2 || '',
                        l3: item.l3 || '',
                        priceJudge: item.priceJudge || '',
                        updateDate: item.updateDate || '',
                        inviteId: item.inviteId || '',
                        final1688: item.final_1688_link || '',
                        variants: [],
                        imgUrls: []
                    });
                }
                const group = map.get(id);
                // 去重添加 variant
                const existing = group.variants.find(v => v.modelId === item.modelId);
                if (!existing) {
                    group.variants.push({
                        variant: item.variant || '默认',
                        price: item.price || '0',
                        modelId: item.modelId || '',
                        imgUrl: item.imgUrl || '',
                        link: item.link || ''
                    });
                }
                if (item.imgUrl && !group.imgUrls.includes(item.imgUrl)) {
                    group.imgUrls.push(item.imgUrl);
                }
                // 标题取第一个非空的
                if (item.title && !group.title) group.title = item.title;
                if (item.priceJudge && !group.priceJudge) group.priceJudge = item.priceJudge;
                if (item.inviteId && !group.inviteId) group.inviteId = item.inviteId;
                if (item.final_1688_link && !group.final1688) group.final1688 = item.final_1688_link;
                if (item.updateDate && !group.updateDate) group.updateDate = item.updateDate;
                if (item.l1 && !group.l1) group.l1 = item.l1;
                if (item.l2 && !group.l2) group.l2 = item.l2;
                if (item.l3 && !group.l3) group.l3 = item.l3;
            });
            groupedData = Array.from(map.values());

            // 计算每个商品的价格区间
            groupedData.forEach(g => {
                const prices = g.variants.map(v => parseFloat(v.price)).filter(p => !isNaN(p));
                if (prices.length) {
                    g.minPrice = Math.min(...prices);
                    g.maxPrice = Math.max(...prices);
                    g.priceDisplay = prices.length === 1 ?
                        '¥' + prices[0].toFixed(2) :
                        '¥' + g.minPrice.toFixed(2) + ' - ¥' + g.maxPrice.toFixed(2);
                } else {
                    g.minPrice = null;
                    g.maxPrice = null;
                    g.priceDisplay = '-';
                }
                g.variantCount = g.variants.length;
            });
        }

        // ============================================================
        //  3. 工具函数
        // ============================================================

        function safeStr(v) { return (v || '').trim(); }

        function getUnique(arr, key) {
            const vals = arr.map(item => safeStr(item[key])).filter(v => v !== '');
            return [...new Set(vals)].sort();
        }
